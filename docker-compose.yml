services:

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wildlog-api
    restart: unless-stopped
    environment:
      DB_PATH: /app/data/hunting.db
      FLASK_DEBUG: "false"
      CORS_ORIGINS: "*"
      SESSION_COOKIE_SECURE: "true"   # requires HTTPS — set false only for local dev
      SESSION_HOURS: "12"
      SECRET_KEY: "${SECRET_KEY}"          # set in .env — required in production
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"  # only used on first boot to create admin user
    volumes:
      - wildlog-data:/app/data
    networks:
      - wildlog-net
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:5050/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: wildlog-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      API_URL: ""
    depends_on:
      api:
        condition: service_healthy
    networks:
      - wildlog-net

volumes:
  wildlog-data:
    driver: local

networks:
  wildlog-net:
    driver: bridge
