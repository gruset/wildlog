server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Main app — block framing (security)
    location / {
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Content-Security-Policy "frame-ancestors 'self'";
        try_files $uri $uri/ /index.html;
    }

    # Embed page — allow framing from any origin
    location = /embed.html {
        add_header X-Frame-Options "ALLOWALL" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # API proxy — all routes
    location /api/ {
        proxy_pass         http://api:5050/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Embed API — explicit CORS headers for cross-origin iframe data fetches
    location /api/embed/ {
        proxy_pass         http://api:5050/api/embed/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        add_header         Access-Control-Allow-Origin  "*" always;
        add_header         Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header         Access-Control-Allow-Headers "Content-Type" always;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://api:5050/api/health;
    }
}
